<form fsForm [submit]="save" *fsSkeletonForm="contentPage">
  <fs-dialog>
    <h1 mat-dialog-title>{{contentPage.id ? 'Page' : 'Create Page'}}</h1>
    <div mat-dialog-content>
      <div class="fs-column">
        <mat-form-field>
          <mat-label>Type</mat-label>
          <mat-select
            [(ngModel)]="contentPage.type"
            name="type"
            required>
            @for (item of PageTypes; track item) {
              <mat-option
                [value]="item.value">
                {{ item.name }}
              </mat-option>
            }
          </mat-select>
        </mat-form-field>
        @if (contentLayouts) {
          <mat-form-field>
            <mat-label>Layout</mat-label>
            <mat-select
              [(ngModel)]="contentPage.contentLayoutId"
              required
              name="contentLayoutId">
              @for (item of contentLayouts; track item) {
                <mat-option
                  [value]="item.id">
                  {{ item.name }}
                </mat-option>
              }
            </mat-select>
          </mat-form-field>
        }
        <mat-form-field>
          <mat-label>Name</mat-label>
          <input
            matInput
            [(ngModel)]="contentPage.name"
            name="name"
            required>
        </mat-form-field>
        <mat-form-field>
          <mat-label>Path</mat-label>
          <input
            matInput
            [(ngModel)]="contentPage.path"
            name="path"
            required>
        </mat-form-field>
        <mat-form-field>
          <mat-label>Title</mat-label>
          <input
            matInput
            [(ngModel)]="contentPage.title"
            name="title">
        </mat-form-field>
      </div>
    </div>

    <div mat-dialog-actions>
      <fs-form-dialog-actions>
      </fs-form-dialog-actions>
    </div>
  </fs-dialog>
</form>
